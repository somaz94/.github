name: Dependabot auto-merge

# Reusable Dependabot auto-merge. Each repository calls this with a tiny stub:
#
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened]
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     auto-merge:
#       uses: somaz94/.github/.github/workflows/dependabot-auto-merge-reusable.yml@main
#
# The stub MUST declare those permissions — a called workflow's permissions
# cannot exceed the caller's, so omitting them makes the run fail to start.
# Auto-merge stays gated to minor/patch bumps; major bumps are left for a
# human to review.

on:
  workflow_call:
    inputs:
      merge-method:
        description: 'Merge method passed to `gh pr merge` (merge, squash, rebase).'
        required: false
        type: string
        default: 'squash'

# One auto-merge attempt per PR at a time. cancel-in-progress: true is
# safe — if Dependabot pushes a new commit mid-run, the next run
# re-fetches metadata and acts on the current head.
concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Auto-merge minor and patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' || steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --${{ inputs.merge-method }} "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
