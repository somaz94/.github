name: Semantic PR

# Reusable Conventional Commits check for pull-request titles. Each repository
# calls this with a tiny stub:
#
#   on:
#     pull_request_target:
#       types: [opened, edited, reopened, synchronize]
#   permissions:
#     pull-requests: read
#   jobs:
#     semantic-pr:
#       uses: somaz94/.github/.github/workflows/semantic-pr-reusable.yml@main
#
# The stub MUST declare that permission — a called workflow's permissions
# cannot exceed the caller's, so omitting it makes the run fail to start.
#
# When a repository squash-merges, the PR title becomes the squash commit's
# subject line, so validating the title here keeps the merged history in
# Conventional Commits form (feat: / fix: / docs: / ...). The trigger is
# `pull_request_target` so titles on fork pull requests are validated too;
# this job only reads the title from event metadata — it never checks out or
# runs PR-authored code — so `pull_request_target` is safe here.

on:
  workflow_call:
    inputs:
      types:
        description: 'Allowed Conventional Commit types, one per line.'
        required: false
        type: string
        default: |
          feat
          fix
          docs
          refactor
          test
          ci
          chore
          build
          perf
          revert
      require-scope:
        description: 'Require a scope in the title, e.g. feat(api): ....'
        required: false
        type: boolean
        default: false
      skip-head-ref-prefixes:
        description: |
          Newline-separated head-branch name prefixes whose pull requests skip
          title validation — e.g. a repo's own E2E self-test branches. A branch
          is exempt when its name starts with any listed prefix. Empty (the
          default) validates every pull request, so existing callers are
          unaffected.
        required: false
        type: string
        default: ''

# One validation per pull request. cancel-in-progress: true is safe — a rapid
# title edit should just let the latest run decide the check status.
concurrency:
  group: semantic-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  semantic-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - name: Check whether the head branch is exempt from validation
        id: skip-check
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          SKIP_PREFIXES: ${{ inputs.skip-head-ref-prefixes }}
        run: |
          set -euo pipefail
          skip=false
          while IFS= read -r prefix; do
            [ -z "$prefix" ] && continue
            case "$HEAD_REF" in
              "$prefix"*) skip=true; break ;;
            esac
          done <<< "$SKIP_PREFIXES"
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          if [ "$skip" = "true" ]; then
            echo "Head branch '$HEAD_REF' matches a skip prefix — skipping PR-title validation."
          fi

      - name: Validate PR title against Conventional Commits
        if: steps.skip-check.outputs.skip != 'true'
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: ${{ inputs.types }}
          requireScope: ${{ inputs.require-scope }}
