name: ok-to-test

# Reusable "/ok-to-test" command gate for CI on fork pull requests.
# Each repository calls this with a tiny stub:
#
#   on:
#     issue_comment:
#       types: [created]
#   permissions:
#     pull-requests: write
#     issues: write
#   jobs:
#     ok-to-test:
#       uses: somaz94/.github/.github/workflows/ok-to-test-reusable.yml@main
#
# The stub MUST declare those permissions — a called workflow's permissions
# cannot exceed the caller's, so omitting them makes the run fail to start.
#
# Fork pull requests get a read-only token and no secrets, so secret-requiring
# or expensive CI cannot (and should not) run automatically. A maintainer
# reviews the diff and comments `/ok-to-test`; this workflow verifies the
# commenter has write access and, if so, applies the `ok-to-test` label. The
# repository's CI then gates its risky jobs on that label, e.g.:
#
#   on:
#     pull_request:
#       types: [opened, synchronize, reopened, labeled]
#   jobs:
#     e2e:
#       if: >
#         github.event.pull_request.head.repo.full_name == github.repository ||
#         contains(github.event.pull_request.labels.*.name, 'ok-to-test')

on:
  workflow_call:
    inputs:
      command:
        description: 'Trigger phrase the comment must start with.'
        required: false
        type: string
        default: '/ok-to-test'
      label:
        description: 'Label applied when the command is authorized.'
        required: false
        type: string
        default: 'ok-to-test'

jobs:
  ok-to-test:
    # Only pull-request comments are relevant; comments on plain issues are
    # ignored. The command-prefix match is done inside the step (a reusable
    # job-level `if` that reads `inputs` fails to compile), so the job
    # condition stays a simple, compile-safe expression.
    if: ${{ github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Authorize commenter and apply label
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const command = `${{ inputs.command }}`;
            const label = `${{ inputs.label }}`;
            const commenter = context.payload.comment.user.login;
            const issue_number = context.payload.issue.number;
            const comment_id = context.payload.comment.id;

            // Ignore comments that are not the trigger command.
            if (!context.payload.comment.body.startsWith(command)) {
              core.info(`Comment does not start with "${command}" — ignoring.`);
              return;
            }

            // Verify the commenter has write access. read/none is rejected so
            // an arbitrary contributor cannot self-approve CI on their own PR.
            const { data: perm } = await github.rest.repos
              .getCollaboratorPermissionLevel({ owner, repo, username: commenter });
            if (!['admin', 'write'].includes(perm.permission)) {
              await github.rest.reactions.createForIssueComment({
                owner, repo, comment_id, content: 'confused',
              });
              core.setFailed(
                `@${commenter} (${perm.permission}) lacks write access — ${label} not applied.`,
              );
              return;
            }

            // Authorized: apply the label (re-triggers label-gated CI) and
            // acknowledge with a 👍 on the command comment.
            await github.rest.issues.addLabels({
              owner, repo, issue_number, labels: [label],
            });
            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id, content: '+1',
            });
