name: Close Stale Issues

# Reusable stale-issue sweeper. Each repository calls this with a tiny stub:
#
#   on:
#     schedule:
#       - cron: '0 0 * * *'
#     workflow_dispatch:
#   permissions:
#     issues: write
#     pull-requests: write
#   jobs:
#     stale:
#       uses: somaz94/.github/.github/workflows/stale-issues-reusable.yml@main
#
# The stub MUST declare those permissions — a called workflow's permissions
# cannot exceed the caller's, so omitting them makes the run fail to start.
# The schedule/dispatch trigger lives in the stub; the reusable only exposes
# the knobs below (all default to the canonical values).

on:
  workflow_call:
    inputs:
      days-before-stale:
        description: 'Days of inactivity before an issue is marked stale.'
        required: false
        type: number
        default: 30
      days-before-close:
        description: 'Days after the stale label before the issue is closed.'
        required: false
        type: number
        default: 7
      stale-issue-message:
        description: 'Comment posted when an issue is marked stale.'
        required: false
        type: string
        default: 'This issue has been automatically marked as stale due to 30 days of inactivity. It will be closed automatically in 7 days if no further activity occurs.'
      close-issue-message:
        description: 'Comment posted when an issue is closed.'
        required: false
        type: string
        default: 'This issue has been automatically closed due to inactivity. Feel free to reopen if needed.'
      stale-issue-label:
        description: 'Label applied to stale issues.'
        required: false
        type: string
        default: 'stale'
      exempt-issue-labels:
        description: 'Comma-separated labels that exempt an issue from staleness.'
        required: false
        type: string
        default: 'pinned,security,on-hold'

# Daily schedule + manual dispatch could overlap. Serialize so two stale
# passes don't double-label or double-close.
concurrency:
  group: stale-issues
  cancel-in-progress: false

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: ${{ inputs.days-before-stale }}
          days-before-close: ${{ inputs.days-before-close }}
          stale-issue-message: ${{ inputs.stale-issue-message }}
          close-issue-message: ${{ inputs.close-issue-message }}
          stale-issue-label: ${{ inputs.stale-issue-label }}
          exempt-issue-labels: ${{ inputs.exempt-issue-labels }}
